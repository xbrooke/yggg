<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#04B03F"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(100, 100)">
    <rect width="1000" height="430" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="1000" height="8" rx="4" fill="url(#bg)"/>
    <image href="/logo.png" x="80" y="60" width="80" height="80"/>
    <text x="180" y="115" font-family="system-ui, sans-serif" font-size="52" font-weight="800" fill="#111827">企小帮</text>
    <text x="180" y="155" font-family="system-ui, sans-serif" font-size="22" fill="#6b7280">专注深圳企业财税服务</text>
    <line x1="80" y1="200" x2="200" y2="200" stroke="#059669" stroke-width="3"/>
    <g transform="translate(80, 230)">
      <circle cx="20" cy="15" r="6" fill="#059669"/>
      <text x="40" y="20" font-family="system-ui, sans-serif" font-size="20" fill="#374151">代理记账 · 税务申报</text>
    </g>
    <g transform="translate(80, 270)">
      <circle cx="20" cy="15" r="6" fill="#059669"/>
      <text x="40" y="20" font-family="system-ui, sans-serif" font-size="20" fill="#374151">工商变更 · 公司注册</text>
    </g>
    <g transform="translate(80, 310)">
      <circle cx="20" cy="15" r="6" fill="#059669"/>
      <text x="40" y="20" font-family="system-ui, sans-serif" font-size="20" fill="#374151">专业团队 · 合规保障</text>
    </g>
    <g transform="translate(700, 80)">
      <rect x="0" y="0" width="200" height="200" rx="20" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
      <image href="/logo.png" x="60" y="60" width="80" height="80"/>
    </g>
    <text x="800" y="320" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#059669" text-anchor="middle">微信扫码咨询</text>
    <text x="600" y="570" font-family="Arial, sans-serif" font-size="18" fill="#9ca3af" text-anchor="middle">github.com/xbrooke/yggg</text>
  </g>
